apiVersion: apps/v1
kind: Deployment
metadata:
  name: groupwise-worker
  namespace: migration-system
  labels:
    app: groupwise-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: groupwise-worker
  template:
    metadata:
      labels:
        app: groupwise-worker
    spec:
      containers:
      - name: groupwise-worker
        image: busybox:latest
        command: ["/bin/sh", "-c"]
        args: ["echo 'GroupWise Worker Started'; sleep 3600"]
        resources:
          requests:
            memory: "32Mi"
            cpu: "20m"
          limits:
            memory: "64Mi"
            cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: groupwise-worker
  namespace: migration-system
spec:
  selector:
    app: groupwise-worker
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
